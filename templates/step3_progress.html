{% extends "base.html" %}
{% set step = 4 %}

{% block content %}

<div class="card" style="text-align: center; padding: 48px 32px;">

  <div style="font-size: 48px; margin-bottom: 16px;">⏳</div>

  <div class="card-title" style="font-size: 24px; margin-bottom: 8px;">
    Uploading Students...
  </div>
  <div class="card-sub" style="margin-bottom: 32px;">
    Please keep this tab open. Do not refresh or go back.
  </div>

  <!-- PROGRESS BAR -->
  <div style="background: var(--gray-1); border-radius: 999px; height: 18px; overflow: hidden; margin-bottom: 16px;">
    <div id="progress-bar"
         style="height: 100%; width: 0%; background: linear-gradient(90deg, var(--saffron), var(--green));
                border-radius: 999px; transition: width 0.5s ease;">
    </div>
  </div>

  <!-- COUNTER TEXT -->
  <div id="progress-text" style="font-size: 18px; font-weight: 600; color: var(--navy); margin-bottom: 8px;">
    Starting upload...
  </div>
  <div id="progress-sub" style="color: var(--gray-3); font-size: 14px;">
    Each student takes about 1–2 seconds
  </div>

  <!-- SUCCESS/FAIL LIVE TALLY (shown after first result) -->
  <div id="tally" style="display:none; margin-top: 24px; gap: 24px; justify-content: center;">
    <div style="background: var(--green-lt); border-radius: 8px; padding: 10px 24px;">
      <div style="font-size: 22px; font-weight: 700; color: var(--green);" id="tally-ok">0</div>
      <div style="font-size: 12px; color: var(--green);">Added</div>
    </div>
    <div style="background: #FFF0F0; border-radius: 8px; padding: 10px 24px;">
      <div style="font-size: 22px; font-weight: 700; color: #C62828;" id="tally-fail">0</div>
      <div style="font-size: 12px; color: #C62828;">Failed</div>
    </div>
  </div>

</div>

<script>
  const total = {{ total }};
  let pollInterval;

  function poll() {
    fetch("/progress")
      .then(r => r.json())
      .then(data => {
        const done     = data.done  || 0;
        const tot      = data.total || total;
        const finished = data.finished;
        const pct      = tot > 0 ? Math.round((done / tot) * 100) : 0;

        // Update progress bar
        document.getElementById("progress-bar").style.width = pct + "%";

        // Update counter text
        if (done === 0) {
          document.getElementById("progress-text").textContent = "Connecting to portal...";
        } else {
          document.getElementById("progress-text").textContent =
            `Uploaded ${done} of ${tot} students (${pct}%)`;
        }

        // Show tally block once we have at least one result
        if (done > 0) {
          document.getElementById("tally").style.display = "flex";
        }

        // Redirect to results when done
        if (finished) {
          clearInterval(pollInterval);
          document.getElementById("progress-text").textContent = "✅ Upload complete! Loading results...";
          document.getElementById("progress-bar").style.width  = "100%";
          setTimeout(() => { window.location.href = "/results"; }, 800);
        }

        // Handle error (session lost etc.)
        if (data.error) {
          clearInterval(pollInterval);
          document.getElementById("progress-text").textContent = "❌ Error: " + data.error;
          document.getElementById("progress-sub").textContent  = "Please go back and try again.";
        }
      })
      .catch(() => {
        // Network hiccup — keep trying, don't stop polling
      });
  }

  // Poll every 2 seconds
  pollInterval = setInterval(poll, 2000);
  poll(); // also call immediately on page load
</script>

{% endblock %}
